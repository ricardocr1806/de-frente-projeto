name: Deploy to Cloudflare Pages

on:
  push:
    branches: [main, master]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npm run build
      - run: ls -la && ls -la out/ || echo "out nao existe, listando .next:" && ls -la .next/ || true
      - run: npm install -g wrangler
      - run: |
          if [ -d "out" ]; then
            wrangler pages deploy out --project-name=de-frente-projeto --branch=main
          else
            wrangler pages deploy .next --project-name=de-frente-projeto --branch=main
          fi
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
