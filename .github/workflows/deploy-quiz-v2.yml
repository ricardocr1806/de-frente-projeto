name: Deploy Quiz v2 to Cloudflare Pages

on:
  push:
    branches: [main, master]
    paths:
      - 'dist-quiz-v2/**'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - run: npm install -g wrangler
      - run: cd dist-quiz-v2/_worker.js && wrangler pages deploy --project-name=quiz-pierry-v2 --branch=main --commit-dirty=true
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
